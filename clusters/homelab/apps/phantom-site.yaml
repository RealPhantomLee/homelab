apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phantom-site
  namespace: argocd
spec:
  project: default
  # Repository configuration
  source:
    repoURL: https://github.com/realphantomlee/homelab
    targetRevision: main
    path: apps/phantom-site

  # Deployment destination
  destination:
    server: https://kubernetes.default.svc
    namespace: phantom-site

  # Automated sync with self-healing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # Enable cascading deletion
  finalizers:
    - resources-finalizer.argocd.io
