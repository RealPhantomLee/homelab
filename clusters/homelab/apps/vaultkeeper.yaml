apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultkeeper
  namespace: argocd
spec:
  # Repository configuration
  source:
    repoURL: https://github.com/realphantomlee/homelab
    targetRevision: main
    path: apps/vaultkeeper

  # Deployment destination
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultkeeper

  # Automated sync with self-healing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # Enable cascading deletion
  finalizers:
    - resources-finalizer.argocd.io
