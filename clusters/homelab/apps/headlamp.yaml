apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: default
  # Repository configuration
  source:
    repoURL: https://github.com/realphantomlee/homelab
    targetRevision: main
    path: apps/headlamp

  # Deployment destination
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  # Automated sync with self-healing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  # Enable cascading deletion
  finalizers:
    - resources-finalizer.argocd.io
