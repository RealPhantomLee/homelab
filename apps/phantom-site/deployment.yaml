apiVersion: apps/v1
kind: Deployment
metadata:
  name: phantom-site
  namespace: phantom-site
  labels:
    app: phantom-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phantom-site
  template:
    metadata:
      labels:
        app: phantom-site
    spec:
      # Run on cyberdeck (Pi with Tailscale Funnel enabled)
      nodeSelector:
        kubernetes.io/hostname: cyberdeck

      serviceAccountName: phantom-site

      # Pod-level security context — drop root privileges across the pod.
      # The container listens on 8080 (unprivileged) and the Service maps 80 -> 8080.
      # Requires the phantom-site image to be built on nginxinc/nginx-unprivileged
      # (or equivalent) so nginx workers can run as uid 1000.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: phantom-site
          # Build and push nginx image serving phantomcybersolutions.com static content
          # Dockerfile: Dockerfile.phantom-nginx
          # Base: nginxinc/nginx-unprivileged (supports linux/amd64 + linux/arm64, listens on 8080 as uid 1000)
          # COPY from /home/roger/phantomcybersolutions.com/* to /usr/share/nginx/html/
          # image: ghcr.io/realphantomlee/phantom-site:latest
          image: ghcr.io/realphantomlee/phantom-site:v0.1.0
          imagePullPolicy: IfNotPresent

          # Container-level security context — restrict syscalls and filesystem writes.
          # readOnlyRootFilesystem stays false until nginx cache/run/tmp dirs are mounted as emptyDir.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Health check for nginx (probes target the unprivileged container port)
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
