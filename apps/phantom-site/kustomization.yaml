apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: phantom-site

# Directory-relative references (assumes this file is in apps/phantom-site/)
namespace: phantom-site

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

commonLabels:
  app: phantom-site
  managed-by: argocd

# Pinned image — override here when promoting a new build
images:
  - name: ghcr.io/realphantomlee/phantom-site
    newTag: v0.1.0
