apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: phantom-site

# Directory-relative references (assumes this file is in apps/phantom-site/)
namespace: phantom-site

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

commonLabels:
  app: phantom-site
  managed-by: argocd

