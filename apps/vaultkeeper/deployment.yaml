apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultkeeper-server
  namespace: vaultkeeper
  labels:
    app: vaultkeeper-server
spec:
  replicas: 0  # DISABLED: Image architecture mismatch on arm64 node (aipi). See audit cycle 1.
  selector:
    matchLabels:
      app: vaultkeeper-server
  template:
    metadata:
      labels:
        app: vaultkeeper-server
    spec:
      # Run on aipi (Pi 5 worker) where data + backup PVCs are local-path provisioned
      nodeSelector:
        kubernetes.io/hostname: aipi

      serviceAccountName: vaultkeeper

      # Pod-level security context — vaultkeeper-server listens on 3456 (unprivileged),
      # so the whole pod can drop root. fsGroup ensures the mounted PVCs are writable
      # by uid 1000.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: vaultkeeper-server
          # Multi-arch image: linux/amd64 + linux/arm64
          # Built with: docker buildx build --platform linux/amd64,linux/arm64 --push ghcr.io/realphantomlee/vaultkeeper-server:latest
          # image: ghcr.io/realphantomlee/vaultkeeper-server:latest
          image: ghcr.io/realphantomlee/vaultkeeper-server:v0.1.0
          imagePullPolicy: IfNotPresent

          # Container-level security context — drop all caps, block privilege escalation.
          # readOnlyRootFilesystem is false because tokio/sqlite scratch space may write
          # outside the mounted PVCs; tighten once the runtime FS profile is verified.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

          ports:
            - name: http
              containerPort: 3456
              protocol: TCP

          env:
            # TODO: configure VaultKeeper-specific env vars
            # - name: LOG_LEVEL
            #   value: "debug"
            # - name: PORT
            #   value: "8080"

          # Mount storage volumes (must match Dockerfile paths)
          volumeMounts:
            # Primary data store (SQLite, configs, etc.)
            - name: data
              mountPath: /opt/vaultkeeper/data

            # Backup directory (snapshots, exports, etc.)
            - name: backups
              mountPath: /opt/vaultkeeper/backups

          # Liveness probe: VaultKeeper should expose /health endpoint
          livenessProbe:
            httpGet:
              path: /health
              port: 3456
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3456
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultkeeper-data

        - name: backups
          persistentVolumeClaim:
            claimName: vaultkeeper-backups
