apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Directory-relative references (assumes this file is in apps/vaultkeeper/)
namespace: vaultkeeper

resources:
  - namespace.yaml
  - deployment.yaml
  - pvc.yaml
  - service.yaml

commonLabels:
  app: vaultkeeper-server
  managed-by: argocd

