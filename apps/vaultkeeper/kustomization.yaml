apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: vaultkeeper

# Directory-relative references (assumes this file is in apps/vaultkeeper/)
namespace: vaultkeeper

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - pvc.yaml
  - service.yaml

commonLabels:
  app: vaultkeeper-server
  managed-by: argocd

# Pinned image — override here when promoting a new build
images:
  - name: ghcr.io/realphantomlee/vaultkeeper-server
    newTag: v0.1.0
