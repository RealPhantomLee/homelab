apiVersion: v1
kind: Service
metadata:
  name: ollama-host
  namespace: local-ai
  labels:
    app: ollama-host
spec:
  # ExternalName service pointing to host-bound Ollama.
  # No selector: manually managed via Endpoints resource.
  # Pods reach Ollama at: http://ollama-host:11434
  type: ExternalName
  externalName: ollama-host.local-ai.svc.cluster.local
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: api
