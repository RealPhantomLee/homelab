apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: homarr

# Directory-relative references (assumes this file is in apps/local-ai/homarr/)
namespace: local-ai

resources:
  - deployment.yaml
  - pvc.yaml
  - service.yaml

commonLabels:
  app: homarr
  managed-by: argocd

