apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: anythingllm

# Directory-relative references (assumes this file is in apps/local-ai/anythingllm/)
namespace: local-ai

resources:
  - ../namespace.yaml
  - ../ollama/endpoints.yaml
  - ../ollama/service.yaml
  - deployment.yaml
  - pvc.yaml
  - service.yaml

commonLabels:
  app: anythingllm
  managed-by: argocd

