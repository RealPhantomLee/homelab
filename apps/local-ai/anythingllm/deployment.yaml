apiVersion: apps/v1
kind: Deployment
metadata:
  name: anythingllm
  namespace: local-ai
  labels:
    app: anythingllm
spec:
  # DISABLED: Image ghcr.io/realphantomlee/anythingllm:latest does not exist. See audit cycle 1.
  replicas: 0
  selector:
    matchLabels:
      app: anythingllm
  template:
    metadata:
      labels:
        app: anythingllm
    spec:
      # Run on blacknode where storage PVC is provisioned via local-path
      nodeSelector:
        kubernetes.io/hostname: blacknode

      # Pod-level security context — anythingllm listens on 3001 (unprivileged), so drop root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: anythingllm
          # Image pinning deferred until ghcr.io/realphantomlee/anythingllm is published.
          image: ghcr.io/realphantomlee/anythingllm:latest
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          env:
            # Point to the manually-managed Ollama Endpoints service
            - name: OLLAMA_BASE_PATH
              value: "http://ollama-host:11434"

            # TODO: set other AnythingLLM env vars as needed
            # - name: LOG_LEVEL
            #   value: "info"

          # Mount storage volume for AnythingLLM state
          volumeMounts:
            - name: storage
              mountPath: /app/server/storage

          # Health check: AnythingLLM should have a readiness endpoint
          # TODO: adjust path if AnythingLLM exposes different health endpoint
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: anythingllm-storage
