apiVersion: v1
kind: Service
metadata:
  name: anythingllm
  namespace: local-ai
  labels:
    app: anythingllm
  annotations:
    # Tailscale Operator annotations for secure exposure on tailnet
    tailscale.com/hostname: "anythingllm"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale

  selector:
    app: anythingllm

  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
