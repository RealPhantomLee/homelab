apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anythingllm-storage
  namespace: local-ai
  labels:
    app: anythingllm
spec:
  accessModes:
    - ReadWriteOnce

  # k3s includes local-path StorageClass by default.
  # Provisioning happens on the node where pod is scheduled (blacknode).
  storageClassName: local-path

  resources:
    requests:
      storage: 10Gi
