name: Validate Kubernetes Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kustomize-build:
    name: Build and validate kustomizations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Build and validate each app kustomization
        run: |
          set -e
          failed=0
          # Find every kustomization.yaml and attempt to build its directory.
          while IFS= read -r kfile; do
            dir="$(dirname "$kfile")"
            echo "::group::Building $dir"
            if ! kustomize build "$dir" > /tmp/manifest.yaml; then
              echo "::error::kustomize build failed for $dir"
              failed=1
              echo "::endgroup::"
              continue
            fi
            echo "Validating $dir against Kubernetes schemas"
            if ! kubeconform \
              -strict \
              -ignore-missing-schemas \
              -summary \
              /tmp/manifest.yaml; then
              echo "::error::kubeconform validation failed for $dir"
              failed=1
            fi
            echo "::endgroup::"
          done < <(find apps -name 'kustomization.yaml' -o -name 'kustomization.yml')

          if [ "$failed" -ne 0 ]; then
            echo "One or more manifests failed validation"
            exit 1
          fi
